services:

  db:
    image: postgres:16-alpine
    container_name: littlefish-db
    environment:
      POSTGRES_DB: littlefish
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    networks:
      - fish-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d littlefish"]
      interval: 10s
      timeout: 5s
      retries: 5

