services:

  db:
    image: postgres:16-alpine
    container_name: littlefish-db
    environment:
      POSTGRES_DB: littlefish
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./manage-your-little-fish/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    networks:
      - fish-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d littlefish"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: littlefish-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/littlefish
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fish-net

networks:
  fish-net:
    driver: bridge

volumes:
  pgdata:
