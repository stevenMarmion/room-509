# ============================================================
#  Test datasource — H2 in-memory (replaces PostgreSQL)
#  Place this file at:
#    backend/src/test/resources/application-test.properties
#
#  Activate it in each @DataJpaTest class with:
#    @ActiveProfiles("test")
# ============================================================

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the schema from entities (bypasses Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Flyway for tests (schema is created by Hibernate above)
spring.flyway.enabled=false
